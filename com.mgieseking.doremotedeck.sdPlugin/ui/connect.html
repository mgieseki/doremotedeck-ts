<!doctype html>
<html>
  <head>
    <title>Connection to Dorico</title>
    <meta charset="utf-8" />
    <script src="./sdpi-components.js"></script>
    <script>
      SDPIComponents.i18n.locales = {
        en: {
          reconnect: "Automatically reconnect to Dorico",
          token: "Session Token",
          connectedTo: "Connected to"
        },
        de: {
          reconnect: "Automatisch wieder verbinden",
          token: "Session-Token",
          connectedTo: "Verbunden mit"
        }
      };
    </script>
  </head>
  <body>
    <sdpi-item label="Port">
      <sdpi-textfield setting="port" pattern="^[0-9]+$" placeholder="4560" global/>
    </sdpi-item>
    <sdpi-item>
      <sdpi-checkbox setting="autoReconnect" default="true" label="__MSG_reconnect__" global/>
    </sdpi-item>
    <sdpi-item label="__MSG_token__">
      <sdpi-textfield id="token" disabled/>
    </sdpi-item>
    <sdpi-item>
      <div class="sdpi-item" id="version"></div>
    </sdpi-item>
    <script>
      const {streamDeckClient} = SDPIComponents;

      function updateInfo(payload) {
        document.getElementById("token").value = payload.token;
        if (payload.version)
          document.getElementById("version").innerText = SDPIComponents.i18n.getMessage('connectedTo')+" Dorico "+payload.version;
      }

      (async function () {
        const info = await streamDeckClient.getConnectionInfo();
        streamDeckClient.sendToPropertyInspector.subscribe((ev) => {
          updateInfo(ev.payload);
        });
        streamDeckClient.send("sendToPlugin", {
          port: document.getElementById("port")
        });
      })();
    </script>
  </body>
</html>
